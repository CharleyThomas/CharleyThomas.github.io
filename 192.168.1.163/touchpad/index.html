<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    <style>
        :root {
            --bg-color: #02041a;
            --menu-bg: #111432;
            --accent-color: #00d4ff;
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- THE HAMBURGER/CROSS BUTTON --- */
        #menu-trigger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000; /* Higher than the menu */
            background: var(--btn-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 28px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 12px; /* Rounded corners for the icon box */
            transition: background 0.3s, transform 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #menu-trigger:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- THE SLIDE-IN MENU --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 380px; /* Even wider */
            height: 100%;
            background-color: var(--menu-bg);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); /* "Pop" effect */
            box-shadow: 15px 0 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            padding: 90px 30px 30px 30px; /* Extra top padding to clear the button */
            box-sizing: border-box;
            border-radius: 0 40px 40px 0; /* More pronounced rounding */
            border-right: 1px solid rgba(0, 212, 255, 0.2);
        }

        #side-menu.open {
            transform: translateX(0);
        }

        /* --- MENU ITEMS --- */
        .menu-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .menu-link {
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            margin: 20px 0;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .menu-link span {
            margin-right: 20px;
            font-size: 1.8rem;
            width: 40px;
            text-align: center;
        }

        .menu-link:hover, .menu-link:active {
            color: var(--accent-color);
        }

        /* --- THE OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }

        #touchpad-area {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.2;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="toggleMenu()">&#9776;</button>

    <nav id="side-menu">
        <div class="menu-header">Hub 192.168.1.163</div>
        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span> Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span> Keyboard</a>
        <a href="#" class="menu-link" style="color: var(--accent-color);"><span>🖱️</span> Touchpad</a>
        
        <div style="flex-grow: 1;"></div>
        <a href="/" class="menu-link" style="font-size: 1rem; opacity: 0.5;">Disconnect</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <h1>Touchpad</h1>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            const trigger = document.getElementById('menu-trigger');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('active');

            // Swap between Hamburger and Cross
            if (menu.classList.contains('open')) {
                trigger.innerHTML = '&times;'; // The Cross
            } else {
                trigger.innerHTML = '&#9776;'; // The Hamburger
            }
        }
    </script>
</body>
</html>
