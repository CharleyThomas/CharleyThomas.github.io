<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    <style>
        :root {
            --bg-color: #02041a;
            --menu-bg: #111432;
            --accent-color: #00d4ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents bouncing on mobile */
            height: 100vh;
        }

        /* --- THE TOUCHPAD AREA --- */
        #touchpad-area {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            opacity: 0.5;
            user-select: none;
        }

        /* --- THE HAMBURGER BUTTON --- */
        #menu-trigger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
        }

        /* --- THE SLIDE-IN MENU --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background-color: var(--menu-bg);
            z-index: 1000;
            transform: translateX(-100%); /* Start off-screen */
            transition: transform 0.3s ease-in-out;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        #side-menu.open {
            transform: translateX(0); /* Slide in */
        }

        /* --- MENU ITEMS --- */
        .menu-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: white;
            font-size: 1.4rem;
            margin: 15px 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .menu-link:hover {
            color: var(--accent-color);
        }

        .menu-link span {
            margin-right: 15px;
        }

        /* --- THE OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="toggleMenu()">&#9776;</button>

    <nav id="side-menu">
        <div class="menu-header">Pi 192.168.1.163</div>
        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span> Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span> Keyboard</a>
        <a href="#" class="menu-link" style="color: var(--accent-color);"><span>🖱️</span> Touchpad</a>
        <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <a href="/" class="menu-link" style="font-size: 1rem; opacity: 0.7;">Close Hub</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <p>Touch & Slide to Move Mouse</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        // Logic for Touchpad movement will go here later!
    </script>
</body>
</html>
