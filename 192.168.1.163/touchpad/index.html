<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120; 
            --menu-bg: rgba(15, 23, 42, 0.85); 
            --accent-color: #38bdf8; 
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- HEADER CONTAINER --- */
        #header-bar {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 2000;
            display: flex;
            align-items: center;
        }

        /* --- HAMBURGER (26x3, 6px gap, 0.4s ease) --- */
        #menu-trigger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #menu-trigger span {
            display: block;
            width: 26px;
            height: 3px;
            background-color: var(--text-color);
            transition: 0.4s ease;
            border-radius: 0; 
        }

        #menu-trigger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        #menu-trigger.open span:nth-child(2) { opacity: 0; }
        #menu-trigger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* --- PAGE TITLE --- */
        #page-title {
            margin-left: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #menu-trigger.open + #page-title { opacity: 0; }

        /* --- MENU (Squared + Frosted Glass) --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 380px;
            height: 100%;
            background-color: var(--menu-bg);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%); 
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.4s ease; 
            display: flex;
            flex-direction: column;
            padding: 100px 40px 40px 40px;
            box-sizing: border-box;
            border-radius: 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        #side-menu.open { transform: translateX(0); }

        /* --- IP HEADER (Using Google Sans Code) --- */
        .menu-header {
            font-family: 'Google Sans Code', monospace; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 40px;
            font-weight: 700;
        }

        .menu-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.6rem;
            font-weight: 600;
            margin: 20px 0;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .menu-link span { margin-right: 25px; font-size: 1.8rem; }
        .menu-link:active { color: var(--accent-color); }

        /* --- OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); 
            display: none;
            z-index: 999;
        }

        #overlay.active { display: block; }

        #touchpad-area {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.03;
            user-select: none;
            font-weight: 900; font-size: 3.5rem;
            letter-spacing: 15px;
        }
    </style>
</head>
<body>

    <div id="header-bar">
        <button id="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <span id="page-title">Touchpad</span>
    </div>

    <nav id="side-menu">
        <div class="menu-header">HUB 192.168.1.163</div>
        
        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span> Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span> Keyboard</a>
        <a href="#" class="menu-link" style="color: var(--accent-color);"><span>🖱️</span> Touchpad</a>
        
        <div style="flex-grow: 1;"></div>
        <a href="/" class="menu-link" style="font-size: 1rem; opacity: 0.4;">Return Home</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <h1>SURFACE</h1>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            const trigger = document.getElementById('menu-trigger');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
            trigger.classList.toggle('open');
        }
    </script>
</body>
</html>
