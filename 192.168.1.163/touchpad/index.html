<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Google+Sans+Code:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120; 
            --menu-bg: rgba(15, 23, 42, 0.95); 
            --accent-color: #38bdf8; 
            --text-color: #f8fafc;
            --ui-border: rgba(255, 255, 255, 0.1);
            --status-green: #22c55e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* --- MAIN INTERFACE LAYOUT --- */
        #main-ui {
            flex: 1;
            display: flex;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        /* Left Side: Hamburger & Vertical Label */
        #left-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
            height: 100%;
        }

        #menu-trigger {
            background: none; border: none; cursor: pointer; padding: 0;
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 40px;
        }
        #menu-trigger span { width: 26px; height: 3px; background-color: white; transition: 0.4s; }

        .vertical-label {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Center: The Touchpad Surfaces */
        #touch-container {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 0 20px;
        }

        .surface {
            border: 2px solid var(--ui-border);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
        }

        #main-pad { flex: 3; }

        #side-buttons {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-btn { flex: 1; }

        /* Persistent Connection Dot */
        #main-status-dot {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 12px;
            height: 12px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--status-green);
        }

        /* --- SIDEBAR MENU --- */
        #side-menu {
            position: fixed; top: 0; left: 0;
            width: 400px; height: 100%;
            background-color: var(--menu-bg);
            backdrop-filter: blur(20px);
            z-index: 3000;
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        #side-menu.open { transform: translateX(0); }

        #close-btn {
            background: none; border: none; color: white;
            font-size: 2.5rem; cursor: pointer;
            padding: 0; margin-bottom: 40px;
            width: fit-content;
        }

        .hub-label {
            font-family: 'Google Sans Code', monospace;
            color: var(--accent-color);
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 50px;
        }

        .menu-link {
            text-decoration: none; color: white;
            font-size: 1.6rem; font-weight: 700;
            display: flex; align-items: center;
            margin-bottom: 35px;
        }
        .menu-link img { width: 40px; margin-right: 25px; } /* Using images for the 3D icons */
        .menu-link.active { color: var(--accent-color); }

        /* Status Footer in Sidebar */
        #menu-status {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #menu-status-dot {
            width: 12px; height: 12px;
            background-color: var(--status-green);
            border-radius: 50%;
        }
        .status-text {
            font-size: 0.85rem; font-weight: 600; line-height: 1.4;
        }
        .ip-text { font-family: 'Google Sans Code', monospace; font-size: 0.75rem; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 2500;
        }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div id="left-bar">
            <button id="menu-trigger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <div class="vertical-label">Touchpad</div>
        </div>

        <div id="touch-container">
            <div id="main-pad" class="surface"></div>
            <div id="side-buttons">
                <div class="side-btn surface"></div>
                <div class="side-btn surface"></div>
            </div>
        </div>

        <div id="main-status-dot"></div>
    </div>

    <nav id="side-menu">
        <button id="close-btn" onclick="toggleMenu()">&times;</button>
        
        <div class="hub-label">HUB 192.168.1.163</div>

        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span>&nbsp;&nbsp;Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span>&nbsp;&nbsp;Keyboard</a>
        <a href="#" class="menu-link active"><span>🖱️</span>&nbsp;&nbsp;Touchpad</a>

        <div id="menu-status">
            <div id="menu-status-dot"></div>
            <div class="status-text">
                Connected to pi at:<br>
                <span class="ip-text">192.168.1.163</span>
            </div>
        </div>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <script>
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
