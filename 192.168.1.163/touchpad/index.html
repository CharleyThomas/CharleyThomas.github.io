<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    <style>
        :root {
            --bg-color: #02041a;
            --menu-bg: #111432;
            --accent-color: #00d4ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- THE ANIMATED HAMBURGER --- */
        #menu-trigger {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 2000;
            background: transparent; /* Box removed */
            border: none;             /* Border removed */
            width: 40px;
            height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* The 3 lines */
        #menu-trigger span {
            display: block;
            width: 100%;
            height: 4px;
            background-color: white;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            transform-origin: left; /* Essential for the "X" rotation */
        }

        /* Animation States */
        #menu-trigger.open span:nth-child(1) {
            transform: rotate(45deg);
        }

        #menu-trigger.open span:nth-child(2) {
            opacity: 0;
            transform: translateX(-20px);
        }

        #menu-trigger.open span:nth-child(3) {
            transform: rotate(-45deg);
        }

        /* --- THE SLIDE-IN MENU --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 380px;
            height: 100%;
            background-color: var(--menu-bg);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 15px 0 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            padding: 100px 40px 40px 40px;
            box-sizing: border-box;
            border-radius: 0 40px 40px 0;
        }

        #side-menu.open {
            transform: translateX(0);
        }

        /* --- MENU LINKS (Clean & Box-free) --- */
        .menu-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .menu-link {
            text-decoration: none;
            color: white;
            font-size: 1.6rem;
            margin: 22px 0;
            display: flex;
            align-items: center;
            background: none;  /* No box */
            border: none;      /* No box */
            padding: 0;        /* No box */
            transition: color 0.3s, transform 0.2s;
        }

        .menu-link span {
            margin-right: 25px;
            font-size: 2rem;
        }

        .menu-link:active {
            color: var(--accent-color);
            transform: translateX(10px); /* Slight slide right when tapped */
        }

        /* --- OVERLAY & BACKGROUND --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }

        #touchpad-area {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.1;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav id="side-menu">
        <div class="menu-header">Hub 192.168.1.163</div>
        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span> Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span> Keyboard</a>
        <a href="#" class="menu-link" style="color: var(--accent-color);"><span>🖱️</span> Touchpad</a>
        
        <div style="flex-grow: 1;"></div>
        <a href="/" class="menu-link" style="font-size: 1.1rem; opacity: 0.4;">Disconnect</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <h1>Touchpad</h1>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            const trigger = document.getElementById('menu-trigger');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
            trigger.classList.toggle('open'); // Toggles the bar animation
        }
    </script>
</body>
</html>
