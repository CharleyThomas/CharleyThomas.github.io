<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020410; 
            --sidebar-bg: rgba(11, 17, 32, 0.8); /* Frosted Glass Base */
            --accent-blue: #38bdf8; 
            --text-white: #ffffff;
            --ui-stroke: rgba(255, 255, 255, 0.1);
            --status-green: #22c55e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* --- BACKGROUND UI (Pads) --- */
        #main-container {
            flex: 1;
            display: flex;
            padding: 40px;
            box-sizing: border-box;
            gap: 20px;
            position: relative;
        }

        #ui-left-rail {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40px;
        }

        .hamburger {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 30px; padding: 0;
        }
        .hamburger span { width: 26px; height: 3px; background: white; }

        .vertical-label {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-weight: 700;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        #pad-layout {
            flex: 1;
            display: flex;
            gap: 15px;
        }

        .pad-area {
            border: 1px solid var(--ui-stroke);
            border-radius: 20px;
            background: rgba(255,255,255,0.01);
        }

        .main-trackpad { flex: 3.5; }
        .side-buttons { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .side-btn { flex: 1; }

        #bg-status-dot {
            position: absolute;
            bottom: 40px; left: 55px;
            width: 12px; height: 12px;
            background: var(--status-green);
            border-radius: 50%;
        }

        /* --- THE SIDEBAR (Your Exact Design) --- */
        #sidebar {
            position: fixed; top: 0; left: 0;
            width: 380px; height: 100%;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            z-index: 3000;
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            padding: 45px;
            box-sizing: border-box;
            border-radius: 0;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 60px;
            gap: 25px;
        }

        .close-icon {
            background: none; border: none; color: white;
            font-size: 2.2rem; cursor: pointer;
            padding: 0; line-height: 1;
        }

        .sidebar-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-item {
            text-decoration: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            margin-bottom: 45px;
        }

        .nav-icon {
            width: 45px;
            height: 45px;
            background: white; /* Matching the white boxes in your screenshot */
            color: #ff4444;    /* Red placeholder '?' */
            margin-right: 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            font-weight: 900;
        }

        /* --- SIDEBAR FOOTER --- */
        .sidebar-footer {
            margin-top: auto;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .indicator-dot {
            width: 14px; height: 14px;
            background: var(--status-green);
            border-radius: 50%;
            margin-top: 4px;
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.3;
        }

        .status-ip {
            display: block;
            font-family: 'Google Sans Code', monospace;
            font-size: 0.75rem;
            margin-top: 3px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 2000;
        }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="ui-left-rail">
            <button class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <div class="vertical-label">Touchpad</div>
        </div>
        
        <div id="pad-layout">
            <div class="pad-area main-trackpad"></div>
            <div class="side-buttons">
                <div class="pad-area side-btn"></div>
                <div class="pad-area side-btn"></div>
            </div>
        </div>

        <div id="bg-status-dot"></div>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <button class="close-icon" onclick="toggleMenu()">&times;</button>
            <span class="sidebar-title">Charley Thomas</span>
        </div>

        <a href="/192.168.1.163/controller" class="nav-item">
            <div class="nav-icon">?</div> Gamepad
        </a>
        <a href="/192.168.1.163/keyboard" class="nav-item">
            <div class="nav-icon">?</div> Keyboard
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">?</div> Touchpad
        </a>

        <div class="sidebar-footer">
            <div class="indicator-dot"></div>
            <div class="status-text">
                Connected to pi at:<br>
                <span class="status-ip">192.168.1.163</span>
            </div>
        </div>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
