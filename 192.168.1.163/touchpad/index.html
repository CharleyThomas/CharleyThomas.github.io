<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    <style>
        :root {
            --bg-color: #02041a;
            --menu-bg: #111432;
            --accent-color: #00d4ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- THE HAMBURGER BUTTON --- */
        #menu-trigger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
        }

        /* --- THE SLIDE-IN MENU --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px; /* Wider menu */
            height: 100%;
            background-color: var(--menu-bg);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); /* Smoother transition */
            box-shadow: 10px 0 20px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            padding: 60px 25px;
            box-sizing: border-box;
            
            /* Rounded corners on the right side only */
            border-radius: 0 30px 30px 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        #side-menu.open {
            transform: translateX(0);
        }

        /* --- MENU ITEMS --- */
        .menu-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .menu-link {
            text-decoration: none;
            color: white;
            font-size: 1.4rem;
            margin: 18px 0;
            display: flex;
            align-items: center;
            transition: transform 0.2s, color 0.2s;
        }

        .menu-link:active {
            transform: scale(0.95); /* Slight "squish" when tapped */
            color: var(--accent-color);
        }

        .menu-link span {
            margin-right: 20px;
            font-size: 1.6rem;
        }

        /* --- THE OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(3px); /* Blurs the background touchpad */
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }

        #touchpad-area {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.3;
            user-select: none;
        }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="toggleMenu()">&#9776;</button>

    <nav id="side-menu">
        <div class="menu-header">Pi 192.168.1.163</div>
        <a href="/192.168.1.163/controller" class="menu-link"><span>🕹️</span> Gamepad</a>
        <a href="/192.168.1.163/keyboard" class="menu-link"><span>⌨️</span> Keyboard</a>
        <a href="#" class="menu-link" style="color: var(--accent-color);"><span>🖱️</span> Touchpad</a>
        <div style="flex-grow: 1;"></div> <a href="/" class="menu-link" style="font-size: 1rem; opacity: 0.6;">Close Hub</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <p>Touchpad Mode Active</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
