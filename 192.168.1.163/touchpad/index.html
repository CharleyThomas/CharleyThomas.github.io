<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020410;      /* Deep navy/black from screenshot */
            --sidebar-bg: #0b1120;   /* Sidebar slate color */
            --accent-blue: #38bdf8;  /* Light blue for HUB and Active link */
            --text-white: #ffffff;
            --ui-stroke: rgba(255, 255, 255, 0.1); /* Subtle borders for pads */
            --status-green: #22c55e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* --- MAIN TOUCHPAD UI --- */
        #main-ui {
            flex: 1;
            display: flex;
            padding: 40px;
            box-sizing: border-box;
            gap: 20px;
            position: relative;
        }

        #left-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40px;
        }

        /* Hamburger (26x3, 6px gap) */
        .hamburger {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px;
            padding: 0; margin-bottom: 30px;
        }
        .hamburger span { width: 26px; height: 3px; background: white; }

        .vertical-label {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-weight: 700;
            font-size: 1.1rem;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* The 1+2 Grid Layout */
        #pad-grid {
            flex: 1;
            display: flex;
            gap: 15px;
        }

        .surface {
            border: 1px solid var(--ui-stroke);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.01);
        }

        #main-pad { flex: 3.5; }

        #side-btns {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-btn { flex: 1; }

        /* Main Screen Status Dot */
        #main-dot {
            position: absolute;
            bottom: 45px; left: 55px;
            width: 10px; height: 10px;
            background: var(--status-green);
            border-radius: 50%;
        }

        /* --- SIDEBAR MENU (PIXEL PERFECT) --- */
        #sidebar {
            position: fixed; top: 0; left: 0;
            width: 320px; height: 100%;
            background-color: var(--sidebar-bg);
            /* Frosted glass internal to menu */
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            z-index: 3000;
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }
        #sidebar.open { transform: translateX(0); }

        .close-x {
            background: none; border: none; color: white;
            font-size: 2.2rem; cursor: pointer;
            width: fit-content; padding: 0;
            margin-bottom: 50px;
        }

        .hub-header {
            font-family: 'Google Sans Code', monospace;
            color: var(--accent-blue);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 55px;
            font-weight: 700;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            margin-bottom: 45px;
        }

        /* Placeholders for your 3D icons */
        .icon-wrap {
            width: 45px;
            margin-right: 25px;
            display: flex;
            justify-content: center;
            font-size: 1.8rem;
        }

        .nav-link.active { color: var(--accent-blue); }

        /* SIDEBAR FOOTER */
        .sidebar-footer {
            margin-top: auto;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .footer-dot {
            width: 12px; height: 12px;
            background: var(--status-green);
            border-radius: 50%;
            margin-top: 4px;
        }

        .footer-text {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .footer-ip {
            font-family: 'Google Sans Code', monospace;
            font-size: 0.7rem;
            display: block;
            margin-top: 2px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 2000;
        }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div id="left-bar">
            <button class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <div class="vertical-label">Touchpad</div>
        </div>

        <div id="pad-grid">
            <div id="main-pad" class="surface"></div>
            <div id="side-btns">
                <div class="side-btn surface"></div>
                <div class="side-btn surface"></div>
            </div>
        </div>

        <div id="main-dot"></div>
    </div>

    <nav id="sidebar">
        <button class="close-x" onclick="toggleMenu()">&times;</button>
        
        <div class="hub-header">HUB 192.168.1.163</div>

        <a href="/192.168.1.163/controller" class="nav-link">
            <div class="icon-wrap">🕹️</div> Gamepad
        </a>
        <a href="/192.168.1.163/keyboard" class="nav-link">
            <div class="icon-wrap">⌨️</div> Keyboard
        </a>
        <a href="#" class="nav-link active">
            <div class="icon-wrap">🖱️</div> Touchpad
        </a>

        <div class="sidebar-footer">
            <div class="footer-dot"></div>
            <div class="footer-text">
                Connected to pi at:<br>
                <span class="footer-ip">192.168.1.163</span>
            </div>
        </div>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
