<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Touchpad 163</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120; 
            --menu-bg: rgba(15, 23, 42, 0.9); /* Darker, more solid glass */
            --accent-color: #38bdf8; 
            --text-color: #f8fafc;
            --dim-text: rgba(248, 250, 252, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- THE HEADER BAR --- */
        #header-bar {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 2000;
            display: flex;
            align-items: center;
        }

        /* --- HAMBURGER (Strict 26x3, 6px gap) --- */
        #menu-trigger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #menu-trigger span {
            display: block;
            width: 26px;
            height: 3px;
            background-color: var(--text-color);
            transition: 0.4s ease;
        }

        #menu-trigger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        #menu-trigger.open span:nth-child(2) { opacity: 0; }
        #menu-trigger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* --- TITLE NEXT TO ICON --- */
        #page-title {
            margin-left: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            transition: opacity 0.2s;
        }

        #menu-trigger.open + #page-title { opacity: 0; }

        /* --- SIDE MENU (The Exact Layout) --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px; /* Reduced width for better mobile fit */
            height: 100%;
            background-color: var(--menu-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.4s ease; 
            display: flex;
            flex-direction: column;
            padding: 100px 30px 40px 30px; /* Precise padding */
            box-sizing: border-box;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        #side-menu.open { transform: translateX(0); }

        /* --- IP HEADER (Using Google Sans Code) --- */
        .menu-header {
            font-family: 'Google Sans Code', monospace;
            font-size: 0.75rem; /* Smaller, cleaner look */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* --- NAVIGATION LINKS --- */
        .menu-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.05rem; /* Matched to typical mobile sidebar scale */
            font-weight: 500;
            margin: 12px 0;
            padding: 10px 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        /* The emoji/icon spacer */
        .menu-link .icon {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        /* Active/Touchpad State */
        .menu-link.active {
            color: var(--accent-color);
        }

        /* --- RETURN HOME --- */
        .footer-link {
            margin-top: auto;
            text-decoration: none;
            color: var(--dim-text);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 0;
            transition: color 0.2s;
        }

        /* --- OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); 
            display: none;
            z-index: 999;
        }
        #overlay.active { display: block; }

        /* --- BACKGROUND SURFACE --- */
        #touchpad-area {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.05;
            user-select: none;
            font-weight: 800; font-size: 2.5rem;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <div id="header-bar">
        <button id="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <span id="page-title">Touchpad</span>
    </div>

    <nav id="side-menu">
        <div class="menu-header">HUB 192.168.1.163</div>
        
        <a href="/192.168.1.163/controller" class="menu-link">
            <span class="icon">🕹️</span> Gamepad
        </a>
        <a href="/192.168.1.163/keyboard" class="menu-link">
            <span class="icon">⌨️</span> Keyboard
        </a>
        <a href="#" class="menu-link active">
            <span class="icon">🖱️</span> Touchpad
        </a>
        
        <a href="/" class="footer-link">Return Home</a>
    </nav>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="touchpad-area">
        <h1>SURFACE</h1>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            const trigger = document.getElementById('menu-trigger');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
            trigger.classList.toggle('open');
        }
    </script>
</body>
</html>
