<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0b1120; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
            min-height: 100dvh; 
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        .version {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1>Welcome to My Page</h1>
    <p>This is the start of something awesome.</p>

    <div class="version">v1.0.0</div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.scale(dpr, dpr);
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const spacing = 30; 

        function animate() {
            ctx.clearRect(0, 0, width, height); 
            
            const time = Date.now(); 
            
            // UPDATED: Calculate how much "leftover" space there is, and divide it by 2 to get the offset margins
            const offsetX = (width % spacing) / 2;
            const offsetY = (height % spacing) / 2;

            // UPDATED: Start our loops at the offset margins instead of at 0
            for (let x = offsetX; x < width; x += spacing) {
                for (let y = offsetY; y < height; y += spacing) {
                    
                    const wave = Math.sin((time / 5000) * Math.PI * 2 + (x + y) * 0.0015);
                    const radius = 2 + (wave * 1.0); 
                    
                    ctx.beginPath();
                    ctx.arc(x, y, Math.max(0.1, radius), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
            
            requestAnimationFrame(animate); 
        }

        animate(); 
    </script>
</body>
</html>
