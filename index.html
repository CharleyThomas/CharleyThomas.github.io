<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    
    <link rel="icon" href="images/icon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424; 
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh; 
        }
        
        /* Glassmorphism Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-sizing: border-box;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .navbar.open {
            height: 440px; 
        }
        .nav-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
        }
        .nav-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            height: 32px;
            width: auto;
            pointer-events: none;
        }
        
        /* Restored Menu Button Layout with Invisible Expanded Hit Area */
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            z-index: 1002;
            position: relative;
        }
        /* The invisible clickable box surrounding the button */
        .menu-button::after {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -15px;
            right: -15px;
        }
        .menu-button span {
            display: block;
            position: absolute;
            width: 24px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 99px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            left: 0;
            pointer-events: none; 
        }
        .menu-button span:nth-child(1) { top: 3px; }
        .menu-button span:nth-child(2) { top: 11px; }
        .menu-button span:nth-child(3) { top: 19px; }

        .menu-button.open span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-button.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-button.open span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        
        .nav-icons {
            display: flex;
            align-items: center;
        }
        .nav-icons a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .nav-icons a:hover {
            color: #ffffff;
            transform: scale(1.05);
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            padding: 10px 40px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .navbar.open .nav-links {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition-delay: 0.1s;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 10px 0;
            font-size: 18px;
            font-weight: 400;
            transition: color 0.2s ease, padding-left 0.2s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
            padding-left: 4px;
        }
        
        .dropdown-footer {
            margin-top: 20px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .copyright-tag {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }
        .version-tag {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 100px; 
            flex-grow: 1; 
            width: 100%;
        }

        /* --- Full-Width Auto Carousel --- */
        .auto-carousel {
            position: relative;
            width: 100vw;
            left: 50%;
            transform: translateX(-50%);
            margin-top: -60px; /* Pulls the carousel up exactly flush with the 60px navbar */
            overflow: hidden;
            background-color: #030424; 
        }

        .auto-carousel-track {
            display: flex;
            width: 100%;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auto-carousel-track img {
            width: 100vw;
            height: auto;
            aspect-ratio: 2000 / 887;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #030424; 
            position: relative;
            color: transparent; /* Hides default broken image icon/text */
        }
        
        /* Custom clean broken image fallback */
        .auto-carousel-track img::before {
            content: attr(alt);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030424;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-header">
            <button class="menu-button" id="menuButton" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <img src="images/logo.png" alt="Logo" class="nav-logo">
            
            <div class="nav-icons">
                <a href="https://github.com" target="_blank" title="GitHub"><i class="bi bi-github"></i></a>
            </div>
        </div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/progress">Project Progress</a>
            <a href="/showcase">Showcase</a>
            <a href="/concepts">Concepts</a>
            <a href="/simulations">Simulations</a>
            <a href="/downloads">Downloads</a>
            <a href="/other">Other</a>
            
            <div class="dropdown-footer">
                <div class="copyright-tag">&copy; 2026 Charley Thomas</div>
                <div class="version-tag">v1.0.35</div>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="auto-carousel">
            <div class="auto-carousel-track" id="autoCarouselTrack">
                <img src="carrousels/image/index/Zelda.png" alt="Zelda Frame 1 (Image Loading...)">
                <img src="carrousels/image/index/Zelda2.png" alt="Zelda Frame 2 (Image Loading...)">
            </div>
        </div>

    </div>

    <script>
        // Untouched Navbar Toggle
        function toggleMenu() {
            const navbar = document.getElementById('navbar');
            const button = document.getElementById('menuButton');
            
            navbar.classList.toggle('open');
            button.classList.toggle('open');
        }

        // Auto-Carousel Logic
        const track = document.getElementById('autoCarouselTrack');
        const slides = track.querySelectorAll('img');
        const totalSlides = slides.length;
        let currentSlide = 0;

        // Auto-slides every 5 seconds (5000 milliseconds)
        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            track.style.transform = `translateX(-${currentSlide * 100}vw)`;
        }, 5000);
    </script>

</body>
</html>
