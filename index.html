<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Your dark blue background color */
            background-color: #0b1120; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
            
            /* UPDATED: Uses 'dvh' so the layout doesn't jump when the mobile URL bar hides */
            min-height: 100dvh; 
        }

        /* Styling for our digital "canvas" */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            /* Using CSS to force it to fill the screen visually */
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        /* Styling for the version number */
        .version {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1>Welcome to My Page</h1>
    <p>This is the start of something awesome.</p>

    <div class="version">v1.0.0</div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // We store these variables globally so the animation loop knows the exact screen size
        let width, height;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            // Grab the device's pixel ratio (usually 2 or 3 on modern phones, 1 on standard monitors)
            const dpr = window.devicePixelRatio || 1;
            
            // Scale the canvas memory up to match the sharp screen
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            // Scale our drawing context so we don't have to change any of our math
            ctx.scale(dpr, dpr);
            
            // Keep the physical size of the canvas mapped to the exact window size
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }
        
        // Redraw sizes whenever the device rotates or window resizes
        window.addEventListener('resize', resizeCanvas);
        
        // Initial setup run
        resizeCanvas();

        const spacing = 30; 

        function animate() {
            // UPDATED: Using our stored width and height so we don't accidentally clear the wrong scaled area
            ctx.clearRect(0, 0, width, height); 
            
            const time = Date.now(); 

            // Loop using the true width and height
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    
                    const wave = Math.sin((time / 5000) * Math.PI * 2 + (x + y) * 0.0015);
                    const radius = 2 + (wave * 1.0); 
                    
                    ctx.beginPath();
                    ctx.arc(x, y, Math.max(0.1, radius), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
            
            requestAnimationFrame(animate); 
        }

        animate(); 
    </script>
</body>
</html>
