<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#0b1120">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Charley Thomas - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0b1120; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100dvh; 
            padding: 0 20px;
            box-sizing: border-box;
            
            user-select: none;
            -webkit-user-select: none;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            pointer-events: none; 
        }

        /* Header Styling with Frosted Glass */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 30px;
            box-sizing: border-box;
            text-align: left;
            font-weight: 700;
            font-size: 1.2rem;
            z-index: 10;
            
            /* The Glass Effect */
            background: rgba(11, 17, 32, 0.7); /* Semi-transparent version of your background */
            backdrop-filter: blur(10px); /* Blurs whatever is behind it */
            -webkit-backdrop-filter: blur(10px); /* For Safari support */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* Subtle bottom edge */
        }

        /* Footer Styling with Frosted Glass */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
            
            /* The Glass Effect */
            background: rgba(11, 17, 32, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05); /* Subtle top edge */
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>Charley Thomas</header>

    <main>
        <h1>Welcome to My Page</h1>
        <p>This is the start of something awesome.</p>
    </main>

    <footer>
        <span>&copy; 2026 Charley Thomas</span>
        <span>v1.0.0</span>
    </footer>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.scale(dpr, dpr);
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const spacing = 30; 

        function animate() {
            ctx.clearRect(0, 0, width, height); 
            
            const time = Date.now(); 
            
            const offsetX = (width % spacing) / 2;
            const offsetY = (height % spacing) / 2;

            for (let x = offsetX + spacing; x < width; x += spacing) {
                for (let y = offsetY; y < height; y += spacing) {
                    
                    const wave = Math.sin((time / 5000) * Math.PI * 2 + (x + y) * 0.0015);
                    const radius = 2 + (wave * 1.0); 
                    
                    ctx.beginPath();
                    ctx.arc(x, y, Math.max(0.1, radius), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
            
            requestAnimationFrame(animate); 
        }

        animate(); 
    </script>
</body>
</html>
