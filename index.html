<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            /* Your dark blue background color */
            background-color: #0b1120; 
            
            /* The line grid pattern */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            
            /* The size of the grid squares */
            background-size: 30px 30px; 
            
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
            min-height: 100vh;
        }

        /* Styling for the version number */
        .version {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5); /* Faded white so it isn't distracting */
            font-family: monospace; /* Gives it a coding/terminal aesthetic */
        }
    </style>
</head>
<body>

    <h1>Welcome to My Page</h1>
    <p>This is the start of something awesome.</p>

    <div class="version">v1.0.0</div>

</body>
</html>
