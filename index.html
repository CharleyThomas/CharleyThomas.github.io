<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pure black background */
            color: #ffffff;
            font-family: sans-serif;
        }

        /* The bar at the top */
        .top-bar {
            width: 100%;
            height: 60px;
            background-color: #111111; /* Slightly lighter than black so you can see it */
            border-bottom: 1px solid #333333;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* Container to push content down below the fixed top bar */
        main {
            margin-top: 60px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* The header image */
        .header-image {
            width: 100%;
            max-width: 1200px; /* Adjust this if you want it smaller/larger */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <main>
        <img src="header.png" alt="Header" class="header-image">
    </main>

</body>
</html>
