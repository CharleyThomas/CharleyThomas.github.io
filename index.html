<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Your dark blue background color */
            background-color: #0b1120; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
            min-height: 100vh;
        }

        /* Styling for our digital "canvas" */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        /* Styling for the version number */
        .version {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1>Welcome to My Page</h1>
    <p>This is the start of something awesome.</p>

    <div class="version">v1.0.0</div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const spacing = 30; 

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            const time = Date.now(); 

            for (let x = 0; x < canvas.width; x += spacing) {
                for (let y = 0; y < canvas.height; y += spacing) {
                    
                    // UPDATED: Time divided by 5000 (slower), coordinates multiplied by 0.0015 (spread further apart)
                    const wave = Math.sin((time / 5000) * Math.PI * 2 + (x + y) * 0.0015);
                    
                    // Radius still rests at 2px and fluctuates by 1px
                    const radius = 2 + (wave * 1.0); 
                    
                    ctx.beginPath();
                    ctx.arc(x, y, Math.max(0.1, radius), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
            
            requestAnimationFrame(animate); 
        }

        animate(); 
    </script>
</body>
</html>
