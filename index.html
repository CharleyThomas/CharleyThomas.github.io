<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pure black background */
            color: #ffffff;
            font-family: sans-serif;
        }

        /* The bar at the top */
        .top-bar {
            width: 100%;
            height: 60px;
            background-color: #111111; 
            border-bottom: 1px solid #333333;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* Container to push content down below the fixed top bar */
        main {
            margin-top: 60px; 
            width: 100%;
            display: block; 
        }

        /* The header image filling the screen */
        .header-image {
            width: 100%;
            height: calc(100vh - 60px); /* Fills the exact viewport height minus the top bar */
            object-fit: cover; /* Ensures the image fills the space without stretching */
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <main>
        <img src="img1.png" alt="Header" class="header-image">
    </main>

</body>
</html>
