<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    
    <link rel="icon" href="images/icon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424; 
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh; 
            overflow-x: hidden; 
        }
        
        /* Glassmorphism Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-sizing: border-box;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .navbar.open {
            height: 440px; 
        }
        .nav-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
        }
        .nav-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            height: 32px;
            width: auto;
            pointer-events: none;
        }
        
        /* Menu Button */
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            z-index: 1002;
            position: relative;
        }
        .menu-button::after {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -15px;
            right: -15px;
        }
        .menu-button span {
            display: block;
            position: absolute;
            width: 24px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 99px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            left: 0;
            pointer-events: none; 
        }
        .menu-button span:nth-child(1) { top: 3px; }
        .menu-button span:nth-child(2) { top: 11px; }
        .menu-button span:nth-child(3) { top: 19px; }

        .menu-button.open span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-button.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-button.open span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        
        .nav-icons {
            display: flex;
            align-items: center;
        }
        .nav-icons a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .nav-icons a:hover {
            color: #ffffff;
            transform: scale(1.05);
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            padding: 10px 40px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .navbar.open .nav-links {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition-delay: 0.1s;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 10px 0;
            font-size: 18px;
            font-weight: 400;
            transition: color 0.2s ease, padding-left 0.2s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
            padding-left: 4px;
        }
        
        .dropdown-footer {
            margin-top: 20px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .copyright-tag {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }
        .version-tag {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 100px; 
            flex-grow: 1; 
            width: 100%;
        }

        /* --- Full-Width Auto Carousel --- */
        .auto-carousel {
            position: relative;
            width: 100vw;
            left: 50%;
            transform: translateX(-50%);
            margin-top: -60px; 
            overflow: hidden;
            background-color: #030424; 
        }

        .auto-carousel-track {
            display: flex;
            width: 100%;
        }

        .carousel-slide {
            position: relative;
            flex: 0 0 100vw; 
            aspect-ratio: 2000 / 887;
            background-color: #030424; 
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            color: transparent; 
        }
        
        .carousel-slide img::before {
            content: attr(alt);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030424;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Text Overlay General Styles */
        .carousel-overlay {
            position: absolute;
            padding: 30px;
            max-width: 450px;
            background: transparent;
            z-index: 10;
            box-sizing: border-box;
        }

        /* --- Corner Positions --- */
        .overlay-bottom-right {
            bottom: 5%;
            right: 5%;
            text-align: right;
        }
        .overlay-bottom-left {
            bottom: 5%;
            left: 5%;
            text-align: left;
        }
        .overlay-top-right {
            top: 12%; 
            right: 5%;
            text-align: right;
        }
        .overlay-top-left {
            top: 12%; 
            left: 5%;
            text-align: left;
        }

        .carousel-overlay h2 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .carousel-overlay p {
            margin: 0 0 20px 0;
            font-size: 16px;
            line-height: 1.5;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .carousel-buttons {
            display: flex;
            gap: 10px;
        }

        /* Adjust button alignment based on location */
        .overlay-bottom-right .carousel-buttons,
        .overlay-top-right .carousel-buttons {
            justify-content: flex-end;
        }
        .overlay-bottom-left .carousel-buttons,
        .overlay-top-left .carousel-buttons {
            justify-content: flex-start;
        }

        /* Dynamic Buttons with Sharp Corners & Flat Hover */
        .carousel-buttons .btn {
            border: none;
            padding: 10px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 0px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: opacity 0.2s ease;
        }

        .carousel-buttons .btn:hover {
            opacity: 0.85; 
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-header">
            <button class="menu-button" id="menuButton" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <img src="images/logo.png" alt="Logo" class="nav-logo">
            
            <div class="nav-icons">
                <a href="https://github.com" target="_blank" title="GitHub"><i class="bi bi-github"></i></a>
            </div>
        </div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/progress">Project Progress</a>
            <a href="/showcase">Showcase</a>
            <a href="/concepts">Concepts</a>
            <a href="/simulations">Simulations</a>
            <a href="/downloads">Downloads</a>
            <a href="/other">Other</a>
            
            <div class="dropdown-footer">
                <div class="copyright-tag">&copy; 2026 Charley Thomas</div>
                <div class="version-tag">v1.0.45</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auto-carousel">
            <div class="auto-carousel-track" id="autoCarouselTrack"></div>
        </div>
    </div>

    <script>
        // Navbar Toggle
        function toggleMenu() {
            document.getElementById('navbar').classList.toggle('open');
            document.getElementById('menuButton').classList.toggle('open');
        }

        // Copy to Clipboard Utility
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Link saved to clipboard!");
            }).catch(err => console.error("Failed to copy: ", err));
        }

        // Custom Text Parser & Carousel Builder
        async function loadDynamicCarousel() {
            const track = document.getElementById('autoCarouselTrack');
            
            try {
                const response = await fetch('carrousels/index.txt');
                if (!response.ok) throw new Error("Could not find index.txt");
                
                const text = await response.text();
                const lines = text.split('\n');
                
                const slides = [];
                let currentSlide = null;

                lines.forEach(line => {
                    const tLine = line.trim();
                    if (!tLine) return;

                    if (tLine.match(/^---\d+---$/)) {
                        if (currentSlide) {
                            slides.push(currentSlide);
                            currentSlide = null;
                        } else {
                            currentSlide = { buttons: [] };
                        }
                        return;
                    }

                    if (currentSlide) {
                        if (tLine.startsWith('image:')) currentSlide.image = tLine.replace('image:', '').trim();
                        else if (tLine.startsWith('text-colour:')) currentSlide.color = tLine.replace('text-colour:', '').trim();
                        else if (tLine.startsWith('location:')) currentSlide.location = tLine.replace('location:', '').trim();
                        else if (tLine.startsWith('title:')) currentSlide.title = tLine.replace('title:', '').trim();
                        else if (tLine.startsWith('body:')) currentSlide.body = tLine.replace('body:', '').trim();
                        
                        else if (tLine.match(/^\d+:/)) {
                            const btnRaw = tLine.substring(tLine.indexOf(':') + 1).trim(); 
                            const btnMatch = btnRaw.match(/(.*?)\s*\((.*?):(.*)\)/);
                            
                            if (btnMatch) {
                                currentSlide.buttons.push({
                                    text: btnMatch[1].trim(),
                                    action: btnMatch[2].trim(),
                                    link: btnMatch[3].trim()
                                });
                            }
                        }
                    }
                });

                track.innerHTML = slides.map(slide => {
                    const colorHex = slide.color.toLowerCase() === 'black' ? '#000000' : slide.color;
                    
                    const btnBg = colorHex;
                    const btnTextColor = (colorHex === '#000000' || colorHex === 'black') ? '#ffffff' : '#000000';
                    const btnStyle = `style="background-color: ${btnBg}; color: ${btnTextColor};"`;

                    const locKey = slide.location ? slide.location.toLowerCase().trim() : 'bottom-right';
                    const posClass = `overlay-${locKey}`;
                    
                    const buttonsHtml = slide.buttons.map(btn => {
                        let safeLink = btn.link;
                        if (!safeLink.startsWith('http')) safeLink = 'https://' + safeLink;

                        if (btn.action === 'goto') {
                            return `<a href="${safeLink}" class="btn" ${btnStyle}>${btn.text}</a>`;
                        } else if (btn.action === 'copy') {
                            return `<button class="btn" ${btnStyle} onclick="copyToClipboard('${safeLink}')">${btn.text}</button>`;
                        }
                        return '';
                    }).join('');

                    return `
                    <div class="carousel-slide">
                        <img src="${slide.image}" alt="${slide.title}">
                        <div class="carousel-overlay ${posClass}" style="color: ${colorHex};">
                            <h2>${slide.title}</h2>
                            <p>${slide.body}</p>
                            <div class="carousel-buttons">
                                ${buttonsHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (slides.length > 1) {
                    setInterval(() => {
                        track.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
                        track.style.transform = `translateX(-100vw)`;
                        
                        setTimeout(() => {
                            track.appendChild(track.firstElementChild);
                            track.style.transition = 'none';
                            track.style.transform = `translateX(0)`;
                        }, 1200);
                    }, 7500); 
                }

            } catch (error) {
                console.error('Carousel Error:', error);
                track.innerHTML = `<div style="padding:40px; color:white;">Error loading carousel data. Check console.</div>`;
            }
        }

        loadDynamicCarousel();
    </script>
</body>
</html>
