<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh;
        }
        /* Glassmorphism Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
        /* Hamburger Button */
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            padding: 0;
            z-index: 1002;
        }
        .menu-button span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
            transition: 0.3s;
        }
        /* Dropdown Menu Layout */
        .dropdown-menu {
            position: fixed;
            top: 60px;
            left: -250px; /* Hidden off-screen by default */
            width: 250px;
            height: calc(100vh - 60px);
            background: rgba(3, 4, 36, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            padding: 20px;
            transition: left 0.3s ease;
            z-index: 1001;
        }
        /* Show menu state */
        .dropdown-menu.open {
            left: 0;
        }
        /* Temporary links styling inside dropdown */
        .dropdown-menu a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 0;
            font-size: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 25vh;
        }
        .centered-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <button class="menu-button" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <div class="container">
        <img src="images/eg.png" alt="Charley Thomas" class="centered-image">
    </div>

    <div class="version-tag">v1.0.0</div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('open');
        }
    </script>

</body>
</html>
