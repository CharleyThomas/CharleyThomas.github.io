<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh;
        }
        /* Glassmorphism Navigation Bar that expands vertically */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Default collapsed height */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-sizing: border-box;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth liquid-like expansion */
        }
        /* Expanded state for navbar */
        .navbar.open {
            height: 260px; 
            background: rgba(3, 4, 36, 0.85); /* Slightly darker tint when open for legibility */
        }
        /* Header section inside nav to keep button fixed at top */
        .nav-header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        /* Precise Hamburger Button */
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            z-index: 1002;
            position: relative;
        }
        .menu-button span {
            display: block;
            position: absolute;
            width: 24px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 99px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            left: 0;
        }
        .menu-button span:nth-child(1) { top: 3px; }
        .menu-button span:nth-child(2) { top: 11px; }
        .menu-button span:nth-child(3) { top: 19px; }

        /* Symmetrical Cross (X) Animation */
        .menu-button.open span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-button.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-button.open span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        /* Menu content links container */
        .nav-links {
            display: flex;
            flex-direction: column;
            padding: 10px 40px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        /* Fade and slide links in when menu is open */
        .navbar.open .nav-links {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition-delay: 0.1s; /* Waits slightly for the expand animation */
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 12px 0;
            font-size: 18px;
            font-weight: 400;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: color 0.2s ease;
        }
        .nav-links a:last-child {
            border-bottom: none;
        }
        .nav-links a:hover {
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 25vh;
        }
        .centered-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-header">
            <button class="menu-button" id="menuButton" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="container">
        <img src="images/eg.png" alt="Charley Thomas" class="centered-image">
    </div>

    <div class="version-tag">v1.0.2</div>

    <script>
        function toggleMenu() {
            const navbar = document.getElementById('navbar');
            const button = document.getElementById('menuButton');
            
            navbar.classList.toggle('open');
            button.classList.toggle('open');
        }
    </script>

</body>
</html>
