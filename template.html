<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        body {
            background-color: #030424;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Extra padding at the top and bottom creates the scrolling room */
            padding-top: 50vh;
            padding-bottom: 100vh;
            color: #ffffff;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .centered-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/eg1.png" alt="Charley Thomas" class="centered-image">
    </div>

</body>
</html>
