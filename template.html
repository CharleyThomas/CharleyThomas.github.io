<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    
    <link rel="icon" href="images/icon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424; /* Restored deep dark blue */
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh;
        }
        /* Glassmorphism Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-sizing: border-box;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Expanded state */
        .navbar.open {
            height: 440px; 
        }
        /* Header section holding the menu button, logo, and GitHub icon */
        .nav-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
        }
        /* Perfectly Centered Logo */
        .nav-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            height: 32px;
            width: auto;
            pointer-events: none;
        }
        /* Precise Hamburger Button */
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            z-index: 1002;
            position: relative;
        }
        .menu-button span {
            display: block;
            position: absolute;
            width: 24px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 99px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            left: 0;
        }
        .menu-button span:nth-child(1) { top: 3px; }
        .menu-button span:nth-child(2) { top: 11px; }
        .menu-button span:nth-child(3) { top: 19px; }

        /* Symmetrical Cross (X) Animation */
        .menu-button.open span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-button.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-button.open span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        /* GitHub Icon Styling */
        .nav-icons {
            display: flex;
            align-items: center;
        }
        .nav-icons a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .nav-icons a:hover {
            color: #ffffff;
            transform: scale(1.05);
        }
        /* Menu content links container */
        .nav-links {
            display: flex;
            flex-direction: column;
            padding: 10px 40px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .navbar.open .nav-links {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition-delay: 0.1s;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 10px 0;
            font-size: 18px;
            font-weight: 400;
            transition: color 0.2s ease, padding-left 0.2s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
            padding-left: 4px;
        }
        /* Bottom Row inside Dropdown Menu */
        .dropdown-footer {
            margin-top: 20px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .copyright-tag {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }
        .version-tag {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 25vh;
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-header">
            <button class="menu-button" id="menuButton" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <img src="images/logo.png" alt="Logo" class="nav-logo">
            
            <div class="nav-icons">
                <a href="https://github.com" target="_blank" title="GitHub"><i class="bi bi-github"></i></a>
            </div>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Project Progress</a>
            <a href="#">Showcase</a>
            <a href="#">Software</a>
            <a href="#">Concepts</a>
            <a href="#">Simulations</a>
            <a href="#">Other</a>
            
            <div class="dropdown-footer">
                <div class="copyright-tag">&copy; 2026 Charley Thomas</div>
                <div class="version-tag">v1.0.23</div>
            </div>
        </div>
    </nav>

    <div class="container">
        </div>

    <script>
        function toggleMenu() {
            const navbar = document.getElementById('navbar');
            const button = document.getElementById('menuButton');
            
            navbar.classList.toggle('open');
            button.classList.toggle('open');
        }
    </script>

</body>
</html>
