<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charley Thomas</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030424;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            box-sizing: border-box;
            position: relative;
            min-height: 150vh; /* Keeps the scrollable space */
        }
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 15vh; /* Moved the image higher up the page */
        }
        .centered-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/eg.png" alt="Charley Thomas" class="centered-image">
    </div>

    <div class="version-tag">v1.0.0</div>

</body>
</html>
