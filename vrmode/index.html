<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Media Converter</title>
    <style>
        body {
            background-color: #111111 !important;
            color: #ffffff !important;
            font-family: sans-serif;
            margin: 0;
            padding: 40px;
        }
        .workspace {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff !important;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .drop-zone {
            border: 2px dashed #444444;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .drop-zone p {
            color: #aaaaaa;
            margin: 0;
        }
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .options-group {
            margin: 20px 0;
        }
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        .switch-track {
            width: 40px;
            height: 20px;
            background-color: #333333;
            border-radius: 10px;
            position: relative;
        }
        .switch-thumb {
            width: 16px;
            height: 16px;
            background-color: #888888;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.1s;
        }
        #projection-toggle {
            display: none;
        }
        #projection-toggle:checked + .switch-track {
            background-color: #ffffff;
        }
        #projection-toggle:checked + .switch-track .switch-thumb {
            transform: translateX(20px);
            background-color: #000000;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="workspace">
    <h1>VR Media Pipeline</h1>
    
    <div class="drop-zone">
        <p id="drop-text">Drag & drop files here or click to browse</p>
        <input type="file" id="file-input">
    </div>

    <div class="options-group">
        <label class="switch-container">
            <span id="switch-label-text">2D Screen (Ambient Background)</span>
            <input type="checkbox" id="projection-toggle">
            <div class="switch-track">
                <div class="switch-thumb"></div>
            </div>
        </label>
    </div>

    <button class="submit-btn" id="launch-btn">Initialize VR Environment</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropText = document.getElementById('drop-text');
    const launchBtn = document.getElementById('launch-btn');
    const projectionToggle = document.getElementById('projection-toggle');
    const switchLabelText = document.getElementById('switch-label-text');

    let mediaUrl = '';
    let isVideo = false;

    projectionToggle.addEventListener('change', () => {
        if (projectionToggle.checked) {
            switchLabelText.textContent = '360° Equirectangular';
        } else {
            switchLabelText.textContent = '2D Screen (Ambient Background)';
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        const fileNameLower = file.name.toLowerCase();
        
        const isImg = file.type.startsWith('image/') || 
                      fileNameLower.endsWith('.png') || 
                      fileNameLower.endsWith('.jpg') || 
                      fileNameLower.endsWith('.jpeg') || 
                      fileNameLower.endsWith('.webp') || 
                      fileNameLower.endsWith('.gif');
                      
        const isVid = file.type.startsWith('video/') || 
                      fileNameLower.endsWith('.mp4') || 
                      fileNameLower.endsWith('.mov') || 
                      fileNameLower.endsWith('.webm') || 
                      fileNameLower.endsWith('.avi');

        if (!isImg && !isVid) {
            alert('Unsupported file type. Please upload an image or video.');
            return;
        }
        
        if (mediaUrl) URL.revokeObjectURL(mediaUrl);

        dropText.innerHTML = `Target: <span style="color:#ffffff;">${file.name}</span>`;
        isVideo = isVid;
        mediaUrl = URL.createObjectURL(file);
    }

    launchBtn.addEventListener('click', () => {
        if (!mediaUrl) {
            alert('Please select or drop a valid file.');
            return;
        }

        const projectionMode = projectionToggle.checked ? '360' : '2d';
        
        sessionStorage.setItem('vrMediaUrl', mediaUrl);
        sessionStorage.setItem('vrMediaType', projectionMode);
        sessionStorage.setItem('vrIsVideo', isVideo);

        window.location.href = 'viewer.html';
    });
</script>

</body>
</html>
