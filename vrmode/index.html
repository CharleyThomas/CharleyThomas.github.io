<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Media Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: grid;
            place-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .workspace {
            width: 100%;
            max-width: 400px;
            display: block;
        }

        h1 {
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 20px 0;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        /* Drag and Drop Zone */
        .drop-zone {
            position: relative;
            border: 1px dashed #2e2e2e;
            border-radius: 4px;
            padding: 48px 16px;
            text-align: center;
            background: transparent;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .drop-zone:hover {
            border-color: #4a4a4a;
        }

        .drop-zone p {
            margin: 0;
            font-size: 13px;
            color: #707070;
            pointer-events: none;
        }

        .drop-zone span {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Invisible but fully clickable input overlaying the drop zone */
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Configuration Container */
        .options-group {
            margin: 28px 0;
        }

        .options-group p {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #707070;
            margin: 0 0 16px 0;
        }

        /* Modern Custom Switch Components */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #ffffff;
            cursor: pointer;
            user-select: none;
        }

        .switch-container span {
            font-weight: 400;
        }

        .switch-track {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #1f1f1f;
            border: 1px solid #2e2e2e;
            border-radius: 10px;
            transition: background-color 0.15s ease;
        }
