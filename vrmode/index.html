<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Media Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #000000;
            --border-color: #1f1f1f;
            --border-hover: #2e2e2e;
            --text-main: #ffffff;
            --text-muted: #707070;
            --accent: #ffffff;
            --accent-text: #000000;
            --accent-hover: #e5e5e5;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .workspace {
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            padding: 20px;
        }

        h1 {
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 20px 0;
            letter-spacing: -0.01em;
        }

        /* Drag and Drop Zone */
        .drop-zone {
            position: relative;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            padding: 40px 16px;
            text-align: center;
            background: transparent;
            cursor: pointer;
            transition: border-color 0.1s ease;
        }

        .drop-zone.drag-over {
            border-color: var(--border-hover);
            background-color: #0f0f0f;
        }

        .drop-zone p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
            pointer-events: none; /* Keeps text from interfering with drag/clicks */
        }

        .drop-zone span {
            color: var(--text-main);
            text-decoration: underline;
        }

        /* Invisible but fully clickable input overlaying the drop zone */
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Configuration Options */
        .options-group {
            margin: 24px 0;
        }

        .options-group p {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 0 0 12px 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            margin: 8px 0;
            cursor: pointer;
            color: var(--text-main);
        }

        .radio-label input {
            margin-right: 10px;
            accent-color: var(--text-main);
        }

        /* Action Button */
        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
